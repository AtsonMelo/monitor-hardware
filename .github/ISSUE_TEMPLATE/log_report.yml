name: Enviar log para análise
description: Envie logs do app para investigação técnica.
title: "[Log]: "
labels:
  - log
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Caminho do log: `%LOCALAPPDATA%\MonitorHardware\logs\app.log`

  - type: input
    id: version
    attributes:
      label: Versão do app
      placeholder: "0.5.1"
    validations:
      required: true

  - type: dropdown
    id: execution
    attributes:
      label: Como foi executado?
      options:
        - Clique duplo no .exe
        - Atalho da área de trabalho
        - Inicialização com Windows
        - PowerShell
        - VS Code
        - Outro
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Conteúdo do app.log
      description: Remova dados pessoais antes de enviar, se necessário.
      render: text
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Observações adicionais
